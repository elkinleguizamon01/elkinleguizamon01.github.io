<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comida del día — Plan de nutrición</title>
<style>
  :root{
    --paper:#EDE6D3;
    --paper-dark:#E3DAC2;
    --ink:#2A2318;
    --ink-soft:#5B4F3C;
    --muted:#8C7F68;
    --line:#C9BEA0;
    --red:#C1443C;
    --red-deep:#8C2E28;
    --green:#5E7A45;
    --green-deep:#3E5230;
    --amber:#B5811E;
    --amber-deep:#7A5814;
    --card:#FBF8F0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Courier New",monospace;
    padding:24px 12px 80px;
    line-height:1.45;
  }
  .wrap{max-width:520px;margin:0 auto;}
  header{text-align:center;margin-bottom:22px;position:relative;}
  header .kicker{
    font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
  }
  header h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:28px;margin:4px 0 2px;font-weight:700;letter-spacing:0.5px;
  }
  header .fecha{font-size:13px;color:var(--ink-soft);}
  .stamp{
    position:absolute;top:-6px;right:0;
    border:2px solid var(--red);color:var(--red-deep);
    border-radius:50%;
    width:64px;height:64px;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;text-align:center;line-height:1.1;
    transform:rotate(12deg);
    letter-spacing:0.5px;
    opacity:0.85;
  }

  .macros{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:2px;
    padding:14px 16px 6px;
    margin-bottom:20px;
  }
  .macro-row{margin-bottom:12px;}
  .macro-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--ink-soft);}
  .macro-top b{color:var(--ink);font-size:13px;}
  .bar{height:8px;background:var(--paper-dark);border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .bar > span{display:block;height:100%;transition:width .3s ease;}
  .b-kcal>span{background:var(--ink-soft);}
  .b-prot>span{background:var(--red);}
  .b-carb>span{background:var(--amber);}
  .b-fat>span{background:var(--green);}

  .ticket{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:2px;
    margin-bottom:18px;
    position:relative;
    padding:14px 16px 10px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;left:0;right:0;height:0;
    border-top:2px dashed var(--line);
  }
  .ticket-head{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px dashed var(--line);
    padding-bottom:8px;margin-bottom:8px;
  }
  .ticket-head .num{font-weight:700;font-size:13px;}
  .ticket-head .titulo{font-size:12px;color:var(--muted);text-align:right;flex:1;margin-left:10px;}
  .item{
    display:flex;align-items:flex-start;gap:10px;
    padding:6px 0;border-bottom:1px dotted var(--line);
    font-size:12.5px;
  }
  .item:last-of-type{border-bottom:none;}
  .item input[type=checkbox]{
    width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:var(--green);cursor:pointer;
  }
  .item .desc{flex:1;}
  .item .desc .g{color:var(--muted);font-size:11px;}
  .item.done .desc{opacity:0.45;text-decoration:line-through;}
  .item .kcal{white-space:nowrap;font-size:12px;color:var(--ink-soft);}
  .ticket-foot{
    display:flex;justify-content:space-between;
    border-top:1px dashed var(--line);
    margin-top:8px;padding-top:8px;
    font-size:12.5px;font-weight:700;
  }

  details.subs{
    background:var(--card);border:1px solid var(--line);border-radius:2px;
    padding:10px 16px;margin-bottom:18px;font-size:12.5px;
  }
  details.subs summary{cursor:pointer;font-weight:700;color:var(--ink-soft);}
  details.subs ul{margin:8px 0 4px;padding-left:18px;}
  details.subs li{margin-bottom:4px;}

  .banner{
    position:sticky;bottom:12px;
    background:var(--red);color:#FBF0EC;
    border-radius:4px;padding:10px 14px;
    font-size:12.5px;text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    margin-top:8px;
  }
  .banner.ok{background:var(--green);}

  .reset{
    display:block;margin:18px auto 0;
    background:none;border:1px solid var(--line);color:var(--ink-soft);
    font-family:inherit;font-size:11px;padding:6px 14px;border-radius:3px;cursor:pointer;
  }
  .reset:hover{border-color:var(--red);color:var(--red-deep);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="stamp">SEGUIR<br>LA TABLA</div>
    <div class="kicker">Comida diaria</div>
    <h1>Plan de nutrición</h1>
    <div class="fecha" id="fecha"></div>
  </header>

  <div class="macros" id="macros"></div>

  <div id="ticketsContainer"></div>

  <div class="ticket" id="suppTicket"></div>

  <details class="subs">
    <summary>Posibles cambios / equivalencias</summary>
    <ul>
      <li><b>150 g de arroz</b> → 170 g papa cocida, 170 g yuca cocida, 140 g plátano maduro, o 100 g de pasta cocida.</li>
      <li><b>200 g de pollo</b> → 1 lata grande de atún en agua + 3 huevos.</li>
    </ul>
  </details>

  <div class="banner" id="banner"></div>

  <button class="reset" id="resetBtn">Reiniciar marcas de hoy</button>

</div>

<script>
const TARGET = { kcal: 2178, prot: 206, carb: 168, fat: 78 };

const MEALS = [
  { titulo: "Desayuno", items: [
    { name: "Huevos al gusto (sin embutidos)", g: "5 u", p:26, c:1, f:0, k:376 },
    { name: "Arepa de maíz blanco", g: "1 u", p:5.07, c:19.89, f:2.07, k:160 },
    { name: "Queso pera", g: "30 g", p:0, c:0, f:0, k:58 },
    { name: "Tinto o aromática sin azúcar", g: "1", p:0, c:0, f:0, k:0 },
  ]},
  { titulo: "Media mañana (complemento)", items: [
    { name: "Yogurt griego o natural", g: "80 g", p:6, c:5, f:2, k:111 },
    { name: "Banano / manzana / fresas / arándanos o mix", g: "100 g", p:1, c:14, f:0.5, k:60 },
  ]},
  { titulo: "Almuerzo", items: [
    { name: "Arroz blanco o de verduras", g: "150 g", p:3.27, c:33.6, f:0.36, k:188 },
    { name: "Atún en agua", g: "100 g", p:24, c:0, f:1, k:167 },
    { name: "Pechuga de pollo / res / cerdo / pescado", g: "100 g", p:40, c:0, f:10, k:163 },
    { name: "Ensalada o verduras al vapor", g: "1 taza", p:0, c:0, f:0, k:40 },
    { name: "Aceite de oliva (cocción)", g: "1 cda", p:0, c:0, f:5, k:45 },
    { name: "Aguacate", g: "40 g", p:0.6, c:2.55, f:4.41, k:69 },
  ]},
  { titulo: "Después de entrenar", items: [
    { name: "Proteína de suero de leche en agua", g: "1 scoop", p:24, c:2, f:1, k:120 },
  ]},
  { titulo: "Cena", items: [
    { name: "Arroz blanco o de verduras", g: "150 g", p:3.27, c:33.6, f:0.36, k:188 },
    { name: "Pechuga de pollo / res / cerdo / pescado", g: "200 g", p:40, c:0, f:10, k:326 },
    { name: "Ensalada o verduras al vapor", g: "1 taza", p:0, c:0, f:0, k:15 },
  ]},
];

const SUPPLEMENTS = [
  { name: "Creatina", g: "5 g", note: "cualquier momento del día, con agua o jugo" },
];

function todayKey(){
  const d = new Date();
  return "nutri:" + d.toISOString().slice(0,10);
}

let checked = {};

async function loadState(){
  try{
    const res = await window.storage.get(todayKey());
    checked = res ? JSON.parse(res.value) : {};
  }catch(e){
    checked = {};
  }
}

async function saveState(){
  try{
    await window.storage.set(todayKey(), JSON.stringify(checked));
  }catch(e){}
}

function fmt(n){
  return (Math.round(n*10)/10).toString();
}

function render(){
  const fechaEl = document.getElementById("fecha");
  const d = new Date();
  fechaEl.textContent = d.toLocaleDateString("es-CO", { weekday:'long', day:'numeric', month:'long' });

  const container = document.getElementById("ticketsContainer");
  container.innerHTML = "";

  let totals = { kcal:0, p:0, c:0, f:0 };

  MEALS.forEach((meal, mi) => {
    const ticket = document.createElement("div");
    ticket.className = "ticket";

    let mealKcal = 0;
    let itemsHtml = "";
    meal.items.forEach((it, ii) => {
      const id = mi + "-" + ii;
      const isDone = !!checked[id];
      if(isDone){
        totals.kcal += it.k; totals.p += it.p; totals.c += it.c; totals.f += it.f;
      }
      mealKcal += it.k;
      itemsHtml += `
        <label class="item ${isDone?'done':''}">
          <input type="checkbox" data-id="${id}" ${isDone?'checked':''}>
          <span class="desc">${it.name}<br><span class="g">${it.g} · P ${fmt(it.p)}g · C ${fmt(it.c)}g · G ${fmt(it.f)}g</span></span>
          <span class="kcal">${it.k} kcal</span>
        </label>`;
    });

    ticket.innerHTML = `
      <div class="ticket-head">
        <span class="num">N.º ${mi+1}</span>
        <span class="titulo">${meal.titulo}</span>
      </div>
      ${itemsHtml}
      <div class="ticket-foot"><span>Subtotal</span><span>${mealKcal} kcal</span></div>
    `;
    container.appendChild(ticket);
  });

  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', async (e) => {
      const id = e.target.dataset.id;
      checked[id] = e.target.checked;
      await saveState();
      render();
    });
  });

  renderMacros(totals);
  renderSupplements();
  renderBanner(totals);
}

function renderSupplements(){
  const el = document.getElementById("suppTicket");
  let itemsHtml = "";
  SUPPLEMENTS.forEach((s, si) => {
    const id = "supp-" + si;
    const isDone = !!checked[id];
    itemsHtml += `
      <label class="item ${isDone?'done':''}">
        <input type="checkbox" data-supp="${id}" ${isDone?'checked':''}>
        <span class="desc">${s.name}<br><span class="g">${s.g} · ${s.note}</span></span>
      </label>`;
  });
  el.innerHTML = `
    <div class="ticket-head">
      <span class="num">Suplementos</span>
      <span class="titulo">No olvidar</span>
    </div>
    ${itemsHtml}
  `;
  el.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', async (e) => {
      const id = e.target.dataset.supp;
      checked[id] = e.target.checked;
      await saveState();
      render();
    });
  });
}

function renderMacros(t){
  const el = document.getElementById("macros");
  const pct = (v, target) => Math.min(100, Math.round((v/target)*100));
  el.innerHTML = `
    <div class="macro-row">
      <div class="macro-top"><span>Calorías</span><b>${Math.round(t.kcal)} / ${TARGET.kcal} kcal</b></div>
      <div class="bar b-kcal"><span style="width:${pct(t.kcal,TARGET.kcal)}%"></span></div>
    </div>
    <div class="macro-row">
      <div class="macro-top"><span>Proteína</span><b>${fmt(t.p)} / ${TARGET.prot} g</b></div>
      <div class="bar b-prot"><span style="width:${pct(t.p,TARGET.prot)}%"></span></div>
    </div>
    <div class="macro-row">
      <div class="macro-top"><span>Carbohidratos</span><b>${fmt(t.c)} / ${TARGET.carb} g</b></div>
      <div class="bar b-carb"><span style="width:${pct(t.c,TARGET.carb)}%"></span></div>
    </div>
    <div class="macro-row">
      <div class="macro-top"><span>Grasas</span><b>${fmt(t.f)} / ${TARGET.fat} g</b></div>
      <div class="bar b-fat"><span style="width:${pct(t.f,TARGET.fat)}%"></span></div>
    </div>
  `;
}

function renderBanner(t){
  const banner = document.getElementById("banner");
  const proteinaId = "3-0";
  const tomoProteina = !!checked[proteinaId];
  const tomoCreatina = !!checked["supp-0"];
  const todoComida = MEALS.every((meal, mi) => meal.items.every((it, ii) => checked[mi+"-"+ii]));
  const todoListo = todoComida && tomoCreatina;

  if(todoListo){
    banner.className = "banner ok";
    banner.textContent = "Comiste todo y tomaste tu creatina. Buen trabajo, mañana se repite.";
  } else if(!tomoCreatina && !tomoProteina){
    banner.className = "banner";
    banner.textContent = "No olvides tomar tu creatina y tu proteína post-entreno hoy.";
  } else if(!tomoCreatina){
    banner.className = "banner";
    banner.textContent = "No olvides tomar tu creatina hoy.";
  } else if(!tomoProteina){
    banner.className = "banner";
    banner.textContent = "No olvides tomar tu proteína después de entrenar y comer las 5 comidas de hoy.";
  } else {
    banner.className = "banner";
    banner.textContent = "Recuerda comer las 5 comidas de hoy, sin saltarte ninguna.";
  }
}

document.getElementById("resetBtn").addEventListener("click", async () => {
  checked = {};
  await saveState();
  render();
});

(async () => {
  await loadState();
  render();
})();
</script>
</body>
</html>
